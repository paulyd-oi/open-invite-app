appId: com.vibecode.openinvite.0qi5wk
---
# BLOCKER: No event with a long description exists in current app state.
# The PostValueInvitePrompt modal blocks autonomous event creation via Maestro.
# This flow captures best-available proof from Pizza Night event.
- launchApp
- tapOn:
    text: "Calendar"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: ".*Pizza.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
# Scroll to description area
- swipe:
    direction: UP
    duration: 300
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: event-detail-long-description-area
