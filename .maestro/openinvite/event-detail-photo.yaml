appId: com.vibecode.openinvite.0qi5wk
---
# BLOCKER: No event with a cover photo exists in current app state.
# The PostValueInvitePrompt modal blocks autonomous event creation via Maestro.
# This flow attempts to find any event with a photo from the calendar.
- launchApp
- tapOn:
    text: "Calendar"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: event-detail-photo-calendar-state
# Try scrolling calendar to find events with photos
- swipe:
    direction: UP
    duration: 300
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: event-detail-photo-calendar-scrolled
